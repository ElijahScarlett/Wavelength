<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wavelength</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0d0d2b 0%, #1a0a3c 50%, #0d1a3c 100%);
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 400px;
      padding: 0 24px;
    }

    .logo {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 48px;
      letter-spacing: 0.05em;
    }

    .input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 16px 20px;
      color: #fff;
      font-size: 16px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .input:focus {
      border-color: rgba(29,185,84,0.5);
    }

    .input::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .btn {
      width: 100%;
      background: #1db954;
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 20px rgba(29,185,84,0.3);
    }

    .btn:hover {
      background: #21d45f;
      transform: scale(1.02);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .error {
      color: #ff4444;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Wavelength</div>
    <div class="tagline">A room for you and your friends</div>

    <input
      class="input"
      id="room-name"
      type="text"
      placeholder="Name your room..."
      maxlength="40"
    />
    <button class="btn" id="create-btn" onclick="createRoom()">Create Room</button>
    <div class="error" id="error">Something went wrong. Try again.</div>
  </div>

  <script>
    async function createRoom() {
      const input = document.getElementById('room-name');
      const btn = document.getElementById('create-btn');
      const error = document.getElementById('error');
      const name = input.value.trim();

      if (!name) {
        input.focus();
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating...';
      error.style.display = 'none';

      try {
        const res = await fetch('/room', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });

        const data = await res.json();

        if (data.room) {
          window.location.href = `/room/${data.room.id}`;
        } else {
          throw new Error('No room returned');
        }
      } catch (err) {
        error.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Room';
      }
    }

    // Allow pressing Enter to create room
    document.getElementById('room-name').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') createRoom();
    });
  </script>
</body>
</html>
